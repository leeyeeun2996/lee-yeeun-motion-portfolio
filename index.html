<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LEE YEEUN Portfolio</title><link rel="stylesheet" href="style.css"></head><body><main class="page home-page"><img class="single-img" src="assets/images/cover.png" alt="portfolio cover"><div class="eye-cover"></div><div class="eyes" aria-hidden="true"><div class="eye"><span class="pupil"></span></div><div class="eye"><span class="pupil"></span></div></div><div class="home-menu-cover"></div><a class="menu-link about-link" href="about.html" aria-label="About Me">ABOUT ME →</a><a class="menu-link projects-link" href="project01.html" aria-label="Projects">PROJECTS →</a></main><script>
(function(){
  const pupils=[...document.querySelectorAll('.pupil')];
  const moves=[[0,0],[18,-8],[-16,10],[12,16],[-10,-14],[6,0]];
  let i=0;
  function tick(){
    const [x,y]=moves[i++%moves.length];
    pupils.forEach(p=>{p.style.transform=`translate(${x}%, ${y}%)`;});
  }
  tick(); setInterval(tick,950);
})();
</script></body></html>
